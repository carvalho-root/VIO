<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../static/css/style.css">
   <link
      rel="stylesheet"
      type="text/css"
      href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css"/>
    <link
      rel="stylesheet"
      type="text/css"
      href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/fill/style.css"/>
</head>

<body>
    <main>
        <div class="barra-pesquisa">
            <div class="pesquisa">
                <form action="/buscar" method="get" class="form-pesquisa"></form>
                <input class="input" type="search" name="q" placeholder="Digite a faixa que desejar" autocomplete="off">
            </div>
        </div>
        <div class="card">
            <div class="card-song">
                <img src="../static/assets/hip-hop.jpg">
                <div class="descricao">
                    <h2>Legend</h2>
                    <i>Anno Domini Beats</i>
                </div>
            </div>
            <div class="duracao">
                <div class="barra">
                    <div class="tempo">
                        <p class="inicio">00:00</p> 
                        <progress value="" max="1"></progress>
                        <p class="fim">3:12</p>
                    </div>
                </div>
                <div class="ponto"></div>
            </div>
            
            <div class="player">
                <i class="ph-fill ph-skip-back"></i>
                <i class="ph-fill ph-play"></i>
                <i class="ph-fill ph-pause"></i>
                <i class="ph-fill ph-skip-forward"></i>
            </div>
        </div>

        <div class="playlist-card">
            <div class="playlist">
                <h2></h2>
            </div>
        </div>
        
        <audio src="../musicas/Legend - Anno Domini Beats.mp3"></audio>
    </main>
</body>
</html>
