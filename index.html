<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/css/style.css">
   <link
      rel="stylesheet"
      type="text/css"
      href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css"/>
    <link
      rel="stylesheet"
      type="text/css"
      href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/fill/style.css"/>
    
    <script src="https://kit.fontawesome.com/95d7cd3f20.js" crossorigin="anonymous"></script>
</head>

<body>
    <div class="sidebar">
        <div class="mobile-card">
            <div class="mobile-menu">
                <div class="line1"></div>
                <div class="line2"></div>
                <div class="line3"></div>
            </div>
        </div>
        <div class="side-card">
            <nav class="menu">
                <ul>
                    <li><a href="#HOME"><i class="fa-solid fa-house" style="color: rgb(255, 255, 255);"></i>Home</a></li>
                    <li><a href="#EXPLORAR"><i class="fa-regular fa-compass" style="color: rgb(255, 255, 255);"></i>Explorar</a></li>
                    <li><a href="#ALBUNS"><i class="fa-solid fa-compact-disc" style="color: rgb(255, 255, 255);"></i>Albuns</a></li>
                    <li><a href="#ARTISTAS"><i class="fa-regular fa-user" style="color: rgb(255, 255, 255);"></i>Artistas</a></li>
                    <li><a href="#PLAYLIST"><i class="fa-solid fa-list" style="color: rgb(255, 255, 255);"></i>Playlist</a></li>
                    <li><a href="#MUSICAS"><i class="fa-regular fa-heart" style="color: rgb(255, 255, 255);"></i>Musicas Curtidas</a></li>
                    <li><a href="#RECENTES"><i class="fa-solid fa-clock-rotate-left" style="color: rgb(255, 255, 255);"></i>Recentes</a></li>
                    <li><a href="#SALVOS"><i class="fa-solid fa-bookmark" style="color: rgb(255, 255, 255);"></i>Salvos</a></li>
                    <li><a href="#CONFIGURACOES"><i class="fa-solid fa-gear" style="color: rgb(255, 255, 255);"></i>Configurações</a></li>     
                </ul>        
            </nav>
        </div>    
    </div>
    <main>
        <section class="barra-pesquisa">
            <div class="pesquisa">

                <form action="/buscar" method="get" class="form-pesquisa">
                    <i class="fa-solid fa-magnifying-glass" style="color: rgb(255, 255, 255);"></i>
                    <input class="input" type="search" name="q" placeholder="Digite a faixa que desejar" autocomplete="off">
                    <i class="fa-solid fa-sliders" style="color: rgb(255, 255, 255);"></i>
                </form>
                
            </div>
        </section>

        <div class="main-cards">
            <section class="card">
                <div class="card-song">
                    <img src="/static/assets/hip-hop.jpg">
                    <div class="descricao">
                        <h2>Legend</h2>
                        <i>Anno Domini Beats</i>
                    </div>
                </div>

                <div class="duracao">
                    <div class="barra"></div>
                    <div class="tempo">
                        <p class="inicio"><b>00:00</b></p> 
                        <progress value="" max="1"></progress>
                        <p class="fim"><b>3:12</b></p>
                    </div>
                </div>

                <div class="ponto"></div>
                    <div class="player">
                        <i class="ph-fill ph-skip-back"></i>
                        <i class="ph-fill ph-play"></i>
                        <i class="ph-fill ph-pause"></i>
                        <i class="ph-fill ph-skip-forward"></i>
                    </div>
                </div>
            </section>
        </div>

        <audio src="/musicas/Legend - Anno Domini Beats.mp3"></audio>
    </main>
    <footer class="footer-card">

    </footer>
    <script src="static/js/script.js"></script>
</body>
</html>
